# PokerNow bot configuration.
# Execution (clicking actions) is REFUSED unless players_consent is true.
mode: observe              # observe | execute  (observe = read + decide + log, never click)
players_consent: false     # MUST be true to allow execute mode (consenting home game)
hero_name:                 # blank = auto-detect your seat (.you-player); or set your display name
kill_file: STOP            # safe stop: create a file with this name (touch STOP) to halt the bot

table:
  url: ""                  # full PokerNow table URL
  site: club               # club  -> www.pokernow.club  |  network -> network.pokernow.com

stakes:
  small_blind: "0.50"      # fallback only — blinds are auto-detected from the live table
  big_blind: "1.00"
  ante: "0"
  buy_in: "0"              # the bot's buy-in (for the re-buy prompt + display); 0 = ask in the UI
  currency: chips

limits:
  stop_loss_bb: 200        # stop the session after losing this many big blinds
  stop_win_bb: 400         # stop after winning this many
  max_hands: 500           # hard cap on hands per session

engine:
  mc_iterations: 1500      # Monte-Carlo equity rollouts per decision (live = snappy + accurate)
  mc_iterations_big_pot: 60000

timing:                    # server-courtesy / realistic pacing for a DISCLOSED bot (not stealth)
  min_think_seconds: 1.5
  max_think_seconds: 6.0

opponents:
  db_path: data/opponents.sqlite
  min_samples_for_exploit: 25   # below this, shrink toward population baseline

logging:
  hand_log_path: data/hands.jsonl
